<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-commerce Product Detail Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: #fff;
      padding: 32px;
      border-radius: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .product-image {
      width: 100%;
      border-radius: 12px;
      object-fit: cover;
      background: #eee;
    }

    h1 {
      margin-top: 0;
    }

    .price {
      font-size: 28px;
      font-weight: bold;
      color: #d32f2f;
      margin: 16px 0;
    }

    .stock {
      margin: 12px 0;
      font-weight: bold;
    }

    .in-stock {
      color: #2e7d32;
    }

    .out-stock {
      color: #c62828;
    }

    .variant-group {
      margin: 20px 0;
    }

    .variant-group button {
      margin-right: 8px;
      margin-top: 8px;
      padding: 8px 14px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      border-radius: 6px;
    }

    .variant-group button.active {
      border-color: #1976d2;
      background: #e3f2fd;
      color: #1976d2;
    }

    .quantity {
      display: flex;
      align-items: center;
      margin: 20px 0;
      gap: 12px;
    }

    .quantity button {
      padding: 6px 12px;
      cursor: pointer;
    }

    .add-btn {
      padding: 12px 24px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    .add-btn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      font-weight: bold;
    }

    .success {
      color: #2e7d32;
    }

    .error {
      color: #c62828;
    }

    .cart {
      margin-bottom: 20px;
      text-align: right;
      font-weight: bold;
    }

    .loading,
    .api-error {
      max-width: 800px;
      margin: 80px auto;
      padding: 24px;
      background: white;
      border-radius: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="cart">Cart Count: <span id="cartCount">0</span></div>

  <div id="app">
    <div class="loading">Loading product...</div>
  </div>

  <script>
    // -----------------------------
    // Mock API service layer
    // -----------------------------

    function getProductDetail(productId) {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          resolve({
            productId: "P001",
            name: "Smartphone Pro Max",
            description: "A high-performance smartphone with advanced camera, long battery life, and fast charging.",
            images: [
              "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=800"
            ],
            variants: [
              {
                skuId: "SKU-001",
                color: "Black",
                size: "128GB",
                price: 1299,
                stock: 10
              },
              {
                skuId: "SKU-002",
                color: "Black",
                size: "256GB",
                price: 1499,
                stock: 5
              },
              {
                skuId: "SKU-003",
                color: "White",
                size: "128GB",
                price: 1299,
                stock: 0
              },
              {
                skuId: "SKU-004",
                color: "White",
                size: "256GB",
                price: 1599,
                stock: 3
              }
            ]
          });
        }, 800);
      });
    }

    let mockCartCount = 0;

    function addToCart({ productId, skuId, quantity }) {
      return new Promise((resolve) => {
        setTimeout(() => {
          const sku = productData.variants.find(v => v.skuId === skuId);

          if (!sku || sku.stock <= 0) {
            resolve({
              success: false,
              message: "Selected SKU is out of stock."
            });
            return;
          }

          if (quantity > sku.stock) {
            resolve({
              success: false,
              message: "Insufficient stock."
            });
            return;
          }

          mockCartCount += quantity;

          resolve({
            success: true,
            cartCount: mockCartCount
          });
        }, 600);
      });
    }

    // -----------------------------
    // State
    // -----------------------------

    let productData = null;
    let selectedColor = "";
    let selectedSize = "";
    let quantity = 1;
    let message = "";

    const app = document.getElementById("app");
    const cartCountEl = document.getElementById("cartCount");

    // -----------------------------
    // Render function
    // -----------------------------

    function render() {
      const selectedSku = productData.variants.find(
        sku => sku.color === selectedColor && sku.size === selectedSize
      );

      const colors = [...new Set(productData.variants.map(v => v.color))];
      const sizes = [...new Set(productData.variants.map(v => v.size))];

      const isOutOfStock = !selectedSku || selectedSku.stock === 0;

      app.innerHTML = `
        <div class="container">
          <div>
            <img class="product-image" src="${productData.images[0]}" alt="${productData.name}" />
          </div>

          <div>
            <h1>${productData.name}</h1>
            <p>${productData.description}</p>

            <div class="price">$${selectedSku ? selectedSku.price : "-"}</div>

            <div class="stock ${isOutOfStock ? "out-stock" : "in-stock"}">
              ${isOutOfStock ? "Out of stock" : `In stock: ${selectedSku.stock}`}
            </div>

            <div class="variant-group">
              <strong>Color:</strong><br />
              ${colors.map(color => `
                <button 
                  class="${color === selectedColor ? "active" : ""}"
                  onclick="selectColor('${color}')"
                >
                  ${color}
                </button>
              `).join("")}
            </div>

            <div class="variant-group">
              <strong>Size:</strong><br />
              ${sizes.map(size => `
                <button 
                  class="${size === selectedSize ? "active" : ""}"
                  onclick="selectSize('${size}')"
                >
                  ${size}
                </button>
              `).join("")}
            </div>

            <div class="quantity">
              <button onclick="decreaseQuantity()" ${quantity <= 1 ? "disabled" : ""}>-</button>
              <span>${quantity}</span>
              <button onclick="increaseQuantity()" ${isOutOfStock || quantity >= selectedSku.stock ? "disabled" : ""}>+</button>
            </div>

            <button 
              class="add-btn"
              onclick="handleAddToCart()"
              ${isOutOfStock ? "disabled" : ""}
            >
              Add to Cart
            </button>

            <div class="message ${message.includes("success") ? "success" : "error"}">
              ${message}
            </div>
          </div>
        </div>
      `;
    }

    // -----------------------------
    // Interaction logic
    // -----------------------------

    function selectColor(color) {
      selectedColor = color;
      quantity = 1;
      message = "";
      render();
    }

    function selectSize(size) {
      selectedSize = size;
      quantity = 1;
      message = "";
      render();
    }

    function decreaseQuantity() {
      if (quantity > 1) {
        quantity--;
        render();
      }
    }

    function increaseQuantity() {
      const selectedSku = productData.variants.find(
        sku => sku.color === selectedColor && sku.size === selectedSize
      );

      if (selectedSku && quantity < selectedSku.stock) {
        quantity++;
        render();
      }
    }

    async function handleAddToCart() {
      const selectedSku = productData.variants.find(
        sku => sku.color === selectedColor && sku.size === selectedSize
      );

      if (!selectedSku) {
        message = "Please select a valid product variant.";
        render();
        return;
      }

      const response = await addToCart({
        productId: productData.productId,
        skuId: selectedSku.skuId,
        quantity
      });

      if (response.success) {
        cartCountEl.textContent = response.cartCount;
        message = "Added to cart successfully!";
      } else {
        message = response.message || "Failed to add product to cart.";
      }

      render();
    }

    // -----------------------------
    // Initial loading
    // -----------------------------

    async function init() {
      try {
        productData = await getProductDetail("P001");

        selectedColor = productData.variants[0].color;
        selectedSize = productData.variants[0].size;

        render();
      } catch (error) {
        app.innerHTML = `
          <div class="api-error">
            Failed to load product information. Please try again later.
          </div>
        `;
      }
    }

    init();
  </script>

</body>
</html>
